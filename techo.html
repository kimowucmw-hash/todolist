<style>
:root{
  --paper:#FBF8F0; --paper-2:#FFFDF7; --ink:#3D3A33; --ink-soft:#8A8678;
  --dot:#E2DBCB; --line:#E7E0D0;
  --butter:#FBEFB8; --butter-tape:#EFCF55;
  --rose:#F6DCD5;   --rose-tape:#DE9F94;
  --sage:#DDE8CF;   --sage-tape:#9FB984;
  --sky:#D9E4EC;    --sky-tape:#85A1B8;
  --danger:#D06B5C;
  --shadow:0 6px 18px rgba(80,70,50,.10), 0 1px 2px rgba(80,70,50,.08);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;}
body{
  font-family:'LXGW WenKai TC','BiauKai','DFKai-SB','標楷體','Noto Sans TC',cursive,sans-serif;
  color:var(--ink); background-color:var(--paper);
  background-image:radial-gradient(var(--dot) 1.4px, transparent 1.4px);
  background-size:22px 22px; background-position:-11px -11px;
  min-height:100vh; -webkit-font-smoothing:antialiased;
}
.wrap{max-width:860px;margin:0 auto;padding:22px 16px 110px;}

/* 抬頭 */
header{position:relative;margin:8px 4px 18px;}
.title{font-size:38px;font-weight:700;letter-spacing:1px;margin:0;display:inline-block;position:relative;}
.title::after{content:"";position:absolute;left:-2px;right:-6px;bottom:4px;height:11px;
  background:var(--sage-tape);opacity:.45;z-index:-1;transform:rotate(-1deg);border-radius:3px;}
.date{font-family:'Caveat',cursive;font-size:22px;color:var(--ink-soft);margin-top:2px;}
.menu-btn{position:absolute;top:2px;right:0;width:40px;height:40px;border-radius:50%;
  background:var(--paper-2);border:1.5px solid var(--line);box-shadow:var(--shadow);
  cursor:pointer;font-size:20px;color:var(--ink-soft);}
.menu-pop{position:absolute;top:48px;right:0;background:var(--paper-2);border:1.5px solid var(--line);
  border-radius:12px;box-shadow:var(--shadow);padding:6px;display:none;z-index:30;min-width:150px;}
.menu-pop.show{display:block;}
.menu-pop button{display:block;width:100%;text-align:left;background:none;border:none;
  font-family:inherit;font-size:16px;color:var(--ink);padding:9px 12px;border-radius:8px;cursor:pointer;}
.menu-pop button:hover{background:var(--line);}
.menu-pop button.danger{color:var(--danger);}

/* 搜尋 */
.search{display:flex;align-items:center;gap:8px;background:var(--paper-2);border:1.5px solid var(--line);
  border-radius:24px;padding:8px 14px;margin:0 4px 16px;box-shadow:var(--shadow);}
.search input{flex:1;border:none;background:transparent;outline:none;font-family:inherit;font-size:17px;color:var(--ink);}
.search .ico{color:var(--ink-soft);font-size:16px;}
.search .clr{cursor:pointer;color:var(--ink-soft);display:none;}
.search.has .clr{display:inline;}

/* 分頁 */
.tabs{display:flex;gap:14px;margin:0 4px 18px;}
.tab{font-family:inherit;font-size:19px;font-weight:700;color:var(--ink-soft);background:none;border:none;
  cursor:pointer;padding:6px 4px 8px;position:relative;}
.tab .cnt{font-family:'Caveat',cursive;font-size:15px;font-weight:600;background:var(--line);
  border-radius:10px;padding:0 7px;margin-left:5px;color:var(--ink-soft);}
.tab.active{color:var(--ink);}
.tab.active::after{content:"";position:absolute;left:0;right:0;bottom:0;height:9px;border-radius:4px;
  background:var(--butter-tape);opacity:.55;transform:rotate(-.6deg);}
.tab.active .cnt{background:var(--butter-tape);color:#5a4a14;}

/* 備忘錄 */
.add-memo{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;
  font-family:inherit;font-size:18px;color:var(--ink-soft);cursor:pointer;background:var(--paper-2);
  border:2px dashed var(--line);border-radius:14px;padding:16px;margin-bottom:18px;transition:.15s;}
.add-memo:hover{border-color:var(--sage-tape);color:var(--ink);}
.memo-grid{columns:3;column-gap:16px;}
@media(max-width:720px){.memo-grid{columns:2;}}
@media(max-width:460px){.memo-grid{columns:1;}}
.memo{break-inside:avoid;margin:0 0 16px;position:relative;border-radius:6px;padding:28px 16px 12px;
  box-shadow:var(--shadow);background:var(--paper-2);transition:opacity .25s, transform .25s;}
.memo.enter{opacity:0;transform:scale(.95);}
.memo.leave{opacity:0;transform:scale(.92);}
.memo::before{content:"";position:absolute;top:-9px;left:50%;width:74px;height:22px;
  transform:translateX(-50%) rotate(-3deg);opacity:.9;border-radius:1px;box-shadow:0 1px 2px rgba(0,0,0,.06);
  background-image:linear-gradient(135deg,rgba(255,255,255,.35) 25%,transparent 25%,transparent 50%,rgba(255,255,255,.35) 50%,rgba(255,255,255,.35) 75%,transparent 75%);
  background-size:8px 8px;}
.memo.butter{background:var(--butter);} .memo.butter::before{background-color:var(--butter-tape);}
.memo.rose{background:var(--rose);}     .memo.rose::before{background-color:var(--rose-tape);}
.memo.sage{background:var(--sage);}     .memo.sage::before{background-color:var(--sage-tape);}
.memo.sky{background:var(--sky);}       .memo.sky::before{background-color:var(--sky-tape);}
.memo.plain::before{background-color:#E4DECF;}
.memo .pin{position:absolute;top:6px;right:8px;font-size:15px;cursor:pointer;opacity:.3;transition:.15s;
  background:none;border:none;line-height:1;}
.memo .pin:hover{opacity:.7;}
.memo.pinned .pin{opacity:1;}
.memo textarea{width:100%;border:none;background:transparent;resize:none;outline:none;overflow:hidden;
  font-family:inherit;font-size:18px;line-height:1.55;color:var(--ink);min-height:50px;}
.memo .foot{display:flex;align-items:center;justify-content:space-between;margin-top:6px;}
.memo .stamp{font-family:'Caveat',cursive;font-size:14px;color:var(--ink-soft);opacity:.75;}
.memo .tools{display:flex;align-items:center;gap:6px;opacity:0;transition:.15s;}
.memo:hover .tools,.memo:focus-within .tools{opacity:1;}
.colors{display:flex;gap:6px;}
.swatch{width:15px;height:15px;border-radius:50%;cursor:pointer;border:1.5px solid rgba(0,0,0,.08);}
.swatch[data-c=butter]{background:var(--butter-tape);}
.swatch[data-c=rose]{background:var(--rose-tape);}
.swatch[data-c=sage]{background:var(--sage-tape);}
.swatch[data-c=sky]{background:var(--sky-tape);}
.swatch[data-c=plain]{background:#fff;}
.del{font-family:'Caveat',cursive;font-size:15px;color:var(--ink-soft);cursor:pointer;background:none;border:none;}
.del:hover{color:var(--danger);}

/* 待辦清單 */
#todoView{background:var(--paper-2);border-radius:14px;box-shadow:var(--shadow);padding:6px 16px 16px;
  background-image:repeating-linear-gradient(transparent,transparent 47px,var(--line) 47px,var(--line) 48px);}
.todo-add{display:flex;align-items:center;gap:10px;height:48px;}
.todo-add input{flex:1;border:none;background:transparent;outline:none;font-family:inherit;font-size:19px;color:var(--ink);}
.todo-add .plus{font-size:24px;color:var(--sage-tape);font-weight:700;}
.todo{display:flex;align-items:center;gap:10px;min-height:48px;transition:opacity .2s, transform .2s;}
.todo.enter{opacity:0;transform:translateX(-12px);}
.todo.leave{opacity:0;transform:translateX(12px);}
.todo.dragging{opacity:.6;}
.grip{flex:none;width:18px;color:var(--ink-soft);opacity:0;cursor:grab;touch-action:none;
  font-size:16px;text-align:center;transition:.15s;}
.todo:hover .grip{opacity:.5;}
.box{flex:none;width:24px;height:24px;border:2px solid var(--ink-soft);border-radius:6px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;background:transparent;transition:.12s;}
.box svg{width:16px;height:16px;stroke:var(--sage-tape);stroke-width:3.4;fill:none;stroke-linecap:round;
  stroke-linejoin:round;stroke-dasharray:30;stroke-dashoffset:30;}
.todo.done .box{border-color:var(--sage-tape);background:rgba(159,185,132,.16);}
.todo.done .box svg{stroke-dashoffset:0;transition:stroke-dashoffset .25s;}
.todo .txt{flex:1;border:none;background:transparent;outline:none;font-family:inherit;font-size:19px;color:var(--ink);}
.todo.done .txt{color:var(--ink-soft);text-decoration:line-through;text-decoration-color:var(--rose-tape);}
.todo .due{font-family:'Caveat',cursive;font-size:15px;color:var(--ink-soft);background:none;border:none;
  cursor:pointer;padding:2px 6px;border-radius:8px;opacity:.45;white-space:nowrap;}
.todo:hover .due{opacity:.8;}
.todo .due.set{opacity:1;background:var(--line);}
.todo .due.over{color:#fff;background:var(--danger);opacity:1;}
.todo .del{opacity:0;}
.todo:hover .del{opacity:1;}
.todo .hide-date{position:absolute;width:1px;height:1px;opacity:0;pointer-events:none;}
.clear-done{font-family:'Caveat',cursive;font-size:16px;color:var(--ink-soft);background:none;border:none;
  cursor:pointer;margin-top:10px;display:none;}
.clear-done.show{display:inline-block;}
.clear-done:hover{color:var(--danger);}

.empty{font-family:'Caveat',cursive;font-size:20px;color:var(--ink-soft);text-align:center;padding:38px 0;}

/* 復原提示 */
.toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(120%);
  background:var(--ink);color:var(--paper);border-radius:24px;padding:11px 18px;display:flex;align-items:center;
  gap:14px;box-shadow:0 10px 30px rgba(0,0,0,.25);z-index:60;font-size:16px;transition:transform .25s;}
.toast.show{transform:translateX(-50%) translateY(0);}
.toast button{background:none;border:none;color:var(--butter-tape);font-family:'Caveat',cursive;
  font-size:18px;font-weight:700;cursor:pointer;}

/* 日曆 popover */
.cal{position:absolute;z-index:80;background:var(--paper-2);border:1.5px solid var(--line);
  border-radius:14px;box-shadow:0 14px 40px rgba(0,0,0,.18);padding:12px;width:262px;}
.cal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.cal-head button{background:none;border:none;font-size:20px;cursor:pointer;color:var(--ink-soft);
  padding:2px 10px;border-radius:8px;line-height:1;}
.cal-head button:hover{background:var(--line);}
.cal-title{font-weight:700;font-size:17px;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;}
.cal-grid .wd{font-family:'Caveat',cursive;font-size:13px;color:var(--ink-soft);text-align:center;padding:2px 0;}
.cal-grid .day{text-align:center;padding:7px 0;border-radius:8px;cursor:pointer;font-size:15px;}
.cal-grid .day:hover{background:var(--line);}
.cal-grid .day.other{color:#cfc8b8;}
.cal-grid .day.today{box-shadow:inset 0 0 0 1.5px var(--sky-tape);}
.cal-grid .day.sel{background:var(--sage-tape);color:#fff;}
.cal-foot{display:flex;gap:6px;margin-top:10px;}
.cal-foot button{flex:1;font-family:inherit;font-size:14px;border:none;border-radius:8px;
  padding:8px;cursor:pointer;background:var(--line);color:var(--ink);}
.cal-foot button:hover{filter:brightness(.96);}
.cal-foot button.clr{color:var(--danger);}

/* 多選刪除 */
.sel-bar{position:fixed;top:0;left:0;right:0;z-index:70;background:var(--ink);color:var(--paper);
  display:none;align-items:center;gap:8px;padding:12px 16px;box-shadow:0 4px 16px rgba(0,0,0,.2);}
.sel-bar.show{display:flex;}
.sel-bar .n{font-size:17px;flex:1;}
.sel-bar button{font-family:inherit;font-size:16px;background:none;border:none;color:var(--paper);
  cursor:pointer;padding:6px 10px;border-radius:8px;}
.sel-bar button:hover{background:rgba(255,255,255,.12);}
.sel-bar button.danger{color:#FFB3A8;font-weight:700;}
body.has-sel-bar .wrap{padding-top:60px;}
.sel-overlay{position:absolute;inset:0;z-index:5;cursor:pointer;border-radius:inherit;}
.mark{width:24px;height:24px;border-radius:50%;border:2px solid var(--ink-soft);background:var(--paper-2);
  display:flex;align-items:center;justify-content:center;flex:none;}
.memo .mark{position:absolute;top:8px;left:8px;}
.item-sel .mark{background:var(--sage-tape);border-color:var(--sage-tape);}
.item-sel .mark::after{content:"✓";color:#fff;font-size:13px;line-height:1;}
.selecting .memo,.selecting .todo{user-select:none;-webkit-user-select:none;-webkit-touch-callout:none;}
.memo.item-sel{outline:2px solid var(--sage-tape);outline-offset:3px;}
.todo.item-sel{background:rgba(159,185,132,.10);border-radius:8px;}
.todo.selectable{position:relative;}

@media(prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important;}}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1 class="title">我的手帳</h1>
    <div class="date" id="date"></div>
    <button class="menu-btn" id="menuBtn">⋯</button>
    <div class="menu-pop" id="menuPop">
      <button id="mExport">匯出備份</button>
      <button id="mImport">匯入備份</button>
      <button id="mClear" class="danger">全部清空</button>
    </div>
    <input type="file" id="fileImport" accept="application/json" style="display:none">
  </header>

  <div class="search" id="searchBar">
    <span class="ico">⌕</span>
    <input id="searchInput" placeholder="搜尋便條或待辦…">
    <span class="clr" id="searchClr">✕</span>
  </div>

  <div class="tabs">
    <button class="tab active" data-tab="memo">備忘錄<span class="cnt" id="memoCnt">0</span></button>
    <button class="tab" data-tab="todo">待辦清單<span class="cnt" id="todoCnt">0</span></button>
  </div>

  <section id="memoView">
    <button class="add-memo" id="addMemo">＋ 貼一張新便條</button>
    <div class="memo-grid" id="memoGrid"></div>
  </section>

  <section id="todoView" style="display:none">
    <div class="todo-add">
      <span class="plus">＋</span>
      <input id="todoInput" placeholder="今天要做什麼？輸入後按 Enter">
    </div>
    <div id="todoList"></div>
    <button class="clear-done" id="clearDone">清除已完成 ✓</button>
  </section>
</div>

<div class="sel-bar" id="selBar">
  <span class="n" id="selN">已選 0 項</span>
  <button id="selAll">全選</button>
  <button class="danger" id="selDel">刪除</button>
  <button id="selCancel">取消</button>
</div>

<div class="toast" id="toast"><span id="toastMsg"></span><button id="toastUndo">復原</button></div>

<script>
const LS="techo_data";
let state={memos:[],todos:[],tab:"memo"};
let search="", isEditing=false;

/* ---- 儲存 ---- */
function load(){
  try{const d=JSON.parse(localStorage.getItem(LS));if(d){
    state.memos=(d.memos||[]).map(m=>({pinned:false,createdAt:Date.now(),updatedAt:Date.now(),...m}));
    state.todos=(d.todos||[]).map(t=>({due:null,createdAt:Date.now(),...t}));
    state.tab=d.tab||"memo";
  }}catch(e){}
}
function save(){localStorage.setItem(LS,JSON.stringify(state));}
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,6);
const autoGrow=el=>{el.style.height='auto';el.style.height=el.scrollHeight+'px';};
const match=s=>!search||(s||'').toLowerCase().includes(search);

/* ---- 復原提示 ---- */
let toastTimer=null,undoFn=null;
function toast(msg,fn){
  clearTimeout(toastTimer);undoFn=fn;
  document.getElementById('toastMsg').textContent=msg;
  const t=document.getElementById('toast');t.classList.add('show');
  toastTimer=setTimeout(()=>{t.classList.remove('show');undoFn=null;},5000);
}
document.getElementById('toastUndo').onclick=()=>{
  if(undoFn)undoFn();undoFn=null;
  document.getElementById('toast').classList.remove('show');clearTimeout(toastTimer);
};

/* ---- 相對時間 ---- */
function ago(ts){
  const s=(Date.now()-ts)/1000;
  if(s<60)return'剛剛';
  if(s<3600)return Math.floor(s/60)+' 分鐘前';
  if(s<86400)return Math.floor(s/3600)+' 小時前';
  if(s<604800)return Math.floor(s/86400)+' 天前';
  const d=new Date(ts);return(d.getMonth()+1)+'/'+d.getDate();
}
function dueLabel(due){
  if(!due)return{txt:'＋日期',cls:''};
  const d=new Date(due+'T00:00:00'),now=new Date();now.setHours(0,0,0,0);
  const diff=Math.round((d-now)/86400000);
  let txt=(d.getMonth()+1)+'/'+d.getDate();
  if(diff===0)txt='今天';else if(diff===1)txt='明天';else if(diff===-1)txt='昨天';
  return{txt:'📅 '+txt,cls:diff<0?'set over':'set'};
}

/* ---- 備忘錄 ---- */
const COLORS=['butter','rose','sage','sky','plain'];
const CHECK='<svg viewBox="0 0 24 24"><path d="M4 13 L9.5 18.5 L20 5.5"/></svg>';
function sortedMemos(){return[...state.memos].sort((a,b)=>(b.pinned?1:0)-(a.pinned?1:0));}
function renderMemos(){
  const g=document.getElementById('memoGrid');g.innerHTML='';
  g.classList.toggle('selecting',selectMode&&selectType==='memo');
  const list=sortedMemos().filter(m=>match(m.content));
  if(!list.length){g.innerHTML='<div class="empty">'+(search?'找不到符合的便條':'還沒有便條，貼一張吧 ✎')+'</div>';return;}
  list.forEach(m=>{
    const card=document.createElement('div');card.className='memo '+(m.color||'plain')+(m.pinned?' pinned':'');
    card.style.transform='rotate('+(m.rot||0)+'deg)';

    const pin=document.createElement('button');pin.className='pin';pin.textContent='📌';pin.title='置頂';
    pin.onclick=()=>{m.pinned=!m.pinned;save();renderMemos();};

    const ta=document.createElement('textarea');ta.value=m.content||'';ta.placeholder='寫點什麼…';
    ta.addEventListener('input',()=>{m.content=ta.value;m.updatedAt=Date.now();autoGrow(ta);save();});
    ta.addEventListener('focus',()=>isEditing=true);
    ta.addEventListener('blur',()=>{isEditing=false;renderMemos();});

    const foot=document.createElement('div');foot.className='foot';
    const stamp=document.createElement('span');stamp.className='stamp';stamp.textContent=ago(m.updatedAt);
    const tools=document.createElement('div');tools.className='tools';
    const cols=document.createElement('div');cols.className='colors';
    COLORS.forEach(c=>{const s=document.createElement('span');s.className='swatch';s.dataset.c=c;
      s.onclick=()=>{m.color=c;card.className='memo '+c+(m.pinned?' pinned':'');save();};cols.appendChild(s);});
    const del=document.createElement('button');del.className='del';del.textContent='撕掉';
    del.onclick=()=>removeMemo(m.id,card);
    tools.appendChild(cols);tools.appendChild(del);
    foot.appendChild(stamp);foot.appendChild(tools);

    card.appendChild(pin);card.appendChild(ta);card.appendChild(foot);
    if(selectMode&&selectType==='memo'){const{mk,ov}=decorate(card,m.id);card.appendChild(mk);card.appendChild(ov);}
    else attachLongPress(card,()=>enterSelect('memo',m.id));
    g.appendChild(card);
    autoGrow(ta);
  });
}
function removeMemo(id,card){
  const idx=state.memos.findIndex(x=>x.id===id);if(idx<0)return;
  const item=state.memos[idx];
  card.classList.add('leave');
  setTimeout(()=>{state.memos.splice(idx,1);save();renderMemos();updateCounts();},220);
  toast('已撕掉便條',()=>{state.memos.splice(idx,0,item);save();renderMemos();updateCounts();});
}
document.getElementById('addMemo').onclick=()=>{
  const now=Date.now();
  state.memos.unshift({id:uid(),content:'',color:COLORS[Math.floor(Math.random()*4)],
    rot:(Math.random()*4-2).toFixed(2),pinned:false,createdAt:now,updatedAt:now});
  save();renderMemos();updateCounts();
  const first=document.querySelector('#memoGrid .memo:not(.pinned) textarea')||document.querySelector('#memoGrid textarea');
  if(first){first.classList.add('enter');requestAnimationFrame(()=>first.closest('.memo').classList.remove('enter'));first.focus();}
};

/* ---- 待辦清單 ---- */
function renderTodos(){
  const list=document.getElementById('todoList');list.innerHTML='';
  list.classList.toggle('selecting',selectMode&&selectType==='todo');
  const items=state.todos.filter(t=>match(t.text));
  if(!items.length){list.innerHTML='<div class="empty">'+(search?'找不到符合的待辦':'清單空空的，新增第一件事 ✓')+'</div>';}
  items.forEach(t=>{
    const row=document.createElement('div');row.className='todo'+(t.done?' done':'');row.dataset.id=t.id;

    const grip=document.createElement('span');grip.className='grip';grip.textContent='⠿';
    if(!search)grip.addEventListener('pointerdown',e=>startDrag(e,row));

    const box=document.createElement('button');box.className='box';box.innerHTML=CHECK;
    box.onclick=()=>{t.done=!t.done;row.classList.toggle('done',t.done);save();updateCounts();refreshClear();};

    const txt=document.createElement('input');txt.className='txt';txt.value=t.text||'';
    txt.addEventListener('input',()=>{t.text=txt.value;save();});
    txt.addEventListener('focus',()=>isEditing=true);
    txt.addEventListener('blur',()=>isEditing=false);
    txt.addEventListener('keydown',e=>{
      if(e.key==='Enter'){e.preventDefault();const i=state.todos.findIndex(x=>x.id===t.id);
        const nt={id:uid(),text:'',done:false,due:null,createdAt:Date.now()};
        state.todos.splice(i+1,0,nt);save();renderTodos();updateCounts();
        const n=[...document.querySelectorAll('.todo')].find(r=>r.dataset.id===nt.id);
        if(n)n.querySelector('.txt').focus();}
    });

    const due=document.createElement('button');const dl=dueLabel(t.due);
    due.className='due '+dl.cls;due.textContent=dl.txt;
    due.onclick=e=>{e.stopPropagation();openCal(due,t);};

    const del=document.createElement('button');del.className='del';del.textContent='刪除';
    del.onclick=()=>removeTodo(t.id,row);

    row.appendChild(grip);row.appendChild(box);row.appendChild(txt);
    row.appendChild(due);row.appendChild(del);list.appendChild(row);
    if(selectMode&&selectType==='todo'){
      row.classList.add('selectable');grip.style.display='none';
      const{mk,ov}=decorate(row,t.id);row.insertBefore(mk,box);row.appendChild(ov);
    }else attachLongPress(row,()=>enterSelect('todo',t.id));
  });
  refreshClear();
}
function removeTodo(id,row){
  const idx=state.todos.findIndex(x=>x.id===id);if(idx<0)return;
  const item=state.todos[idx];
  row.classList.add('leave');
  setTimeout(()=>{state.todos.splice(idx,1);save();renderTodos();updateCounts();},200);
  toast('已刪除待辦',()=>{state.todos.splice(idx,0,item);save();renderTodos();updateCounts();});
}
const tin=document.getElementById('todoInput');
tin.addEventListener('keydown',e=>{
  if(e.key==='Enter'&&tin.value.trim()){
    state.todos.unshift({id:uid(),text:tin.value.trim(),done:false,due:null,createdAt:Date.now()});
    tin.value='';renderTodos();updateCounts();
  }
});
function refreshClear(){
  const has=state.todos.some(t=>t.done);
  document.getElementById('clearDone').classList.toggle('show',has);
}
document.getElementById('clearDone').onclick=()=>{
  const removed=state.todos.map((t,i)=>({t,i})).filter(x=>x.t.done);
  if(!removed.length)return;
  state.todos=state.todos.filter(t=>!t.done);save();renderTodos();updateCounts();
  toast('已清除 '+removed.length+' 項',()=>{
    removed.forEach(x=>state.todos.splice(x.i,0,x.t));save();renderTodos();updateCounts();});
};

/* ---- 拖曳排序 ---- */
let dragEl=null;
function startDrag(e,row){
  e.preventDefault();if(row._lpClear)row._lpClear();dragEl=row;row.classList.add('dragging');
  const list=document.getElementById('todoList');
  const move=ev=>{
    const y=ev.clientY;let after=null;
    [...list.querySelectorAll('.todo:not(.dragging)')].forEach(r=>{
      const b=r.getBoundingClientRect();if(after===null&&y<b.top+b.height/2)after=r;});
    if(after)list.insertBefore(dragEl,after);else list.appendChild(dragEl);
  };
  const up=()=>{
    row.classList.remove('dragging');
    document.removeEventListener('pointermove',move);document.removeEventListener('pointerup',up);
    const ids=[...list.querySelectorAll('.todo')].map(r=>r.dataset.id);
    state.todos.sort((a,b)=>ids.indexOf(a.id)-ids.indexOf(b.id));save();dragEl=null;
  };
  document.addEventListener('pointermove',move);document.addEventListener('pointerup',up);
}

/* ---- 自製日曆 popover ---- */
let calEl=null,calClose=null;
const fmt=d=>d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
function closeCal(){if(calClose){document.removeEventListener('click',calClose);calClose=null;}
  if(calEl){calEl.remove();calEl=null;}}
function openCal(anchor,todo){
  closeCal();
  const view=todo.due?new Date(todo.due+'T00:00:00'):new Date();view.setDate(1);
  calEl=document.createElement('div');calEl.className='cal';
  const today=new Date();today.setHours(0,0,0,0);
  function build(){
    const y=view.getFullYear(),mo=view.getMonth(),start=new Date(y,mo,1).getDay();
    let h='<div class="cal-head"><button data-nav="-1">‹</button><span class="cal-title">'+y+' 年 '+(mo+1)+' 月</span><button data-nav="1">›</button></div><div class="cal-grid">';
    ['日','一','二','三','四','五','六'].forEach(w=>h+='<div class="wd">'+w+'</div>');
    for(let i=0;i<42;i++){
      const d=new Date(y,mo,1-start+i),iso=fmt(d);let c='day';
      if(d.getMonth()!==mo)c+=' other';
      if(+d===+today)c+=' today';
      if(todo.due===iso)c+=' sel';
      h+='<div class="'+c+'" data-d="'+iso+'">'+d.getDate()+'</div>';
    }
    h+='</div><div class="cal-foot"><button data-q="today">今天</button><button data-q="tmr">明天</button><button class="clr" data-q="clear">清除</button></div>';
    calEl.innerHTML=h;
  }
  build();document.body.appendChild(calEl);
  const r=anchor.getBoundingClientRect(),vw=document.documentElement.clientWidth;
  let left=r.left+window.scrollX;if(left+262>window.scrollX+vw)left=window.scrollX+vw-270;if(left<8)left=8;
  calEl.style.left=left+'px';calEl.style.top=(r.bottom+window.scrollY+6)+'px';
  const setDue=v=>{todo.due=v;save();renderTodos();closeCal();};
  calEl.addEventListener('click',e=>{
    const nav=e.target.closest('[data-nav]');if(nav){view.setMonth(view.getMonth()+(+nav.dataset.nav));build();return;}
    const q=e.target.closest('[data-q]');
    if(q){if(q.dataset.q==='clear')return setDue(null);
      const dd=new Date();dd.setHours(0,0,0,0);if(q.dataset.q==='tmr')dd.setDate(dd.getDate()+1);return setDue(fmt(dd));}
    const day=e.target.closest('.day');if(day)setDue(day.dataset.d);
  });
  setTimeout(()=>{calClose=ev=>{if(calEl&&!calEl.contains(ev.target)&&ev.target!==anchor)closeCal();};
    document.addEventListener('click',calClose);},0);
}

/* ---- 多選刪除 ---- */
let selectMode=false,selectType=null,selected=new Set();
function attachLongPress(el,onLong){
  let timer=null,sx=0,sy=0;
  const clear=()=>{if(timer){clearTimeout(timer);timer=null;}};
  el._lpClear=clear;
  el.addEventListener('pointerdown',e=>{
    if(selectMode||e.button===2)return;
    sx=e.clientX;sy=e.clientY;
    timer=setTimeout(()=>{timer=null;
      if(document.activeElement&&document.activeElement.blur)document.activeElement.blur();
      onLong();},480);
  });
  el.addEventListener('pointermove',e=>{if(timer&&(Math.abs(e.clientX-sx)>10||Math.abs(e.clientY-sy)>10))clear();});
  el.addEventListener('pointerup',clear);
  el.addEventListener('pointercancel',clear);
  el.addEventListener('pointerleave',clear);
}
function enterSelect(type,id){
  selectMode=true;selectType=type;selected=new Set(id?[id]:[]);
  document.body.classList.add('has-sel-bar');
  document.getElementById('selBar').classList.add('show');
  (type==='memo'?renderMemos:renderTodos)();updateSelBar();
}
function exitSelect(){
  selectMode=false;selected.clear();
  document.body.classList.remove('has-sel-bar');
  document.getElementById('selBar').classList.remove('show');
  renderMemos();renderTodos();
}
function toggleSel(id){
  selected.has(id)?selected.delete(id):selected.add(id);
  (selectType==='memo'?renderMemos:renderTodos)();updateSelBar();
}
function updateSelBar(){document.getElementById('selN').textContent='已選 '+selected.size+' 項';}
function decorate(el,id){
  if(selected.has(id))el.classList.add('item-sel');
  const mk=document.createElement('span');mk.className='mark';
  const ov=document.createElement('div');ov.className='sel-overlay';
  ov.onclick=e=>{e.stopPropagation();toggleSel(id);};
  return{mk,ov};
}
document.getElementById('selCancel').onclick=exitSelect;
document.getElementById('selAll').onclick=()=>{
  (selectType==='memo'?sortedMemos().filter(m=>match(m.content)):state.todos.filter(t=>match(t.text)))
    .forEach(x=>selected.add(x.id));
  (selectType==='memo'?renderMemos:renderTodos)();updateSelBar();
};
document.getElementById('selDel').onclick=()=>{
  const ids=selected,type=selectType;
  if(!ids.size)return exitSelect();
  if(type==='memo'){
    const rm=state.memos.map((m,i)=>({m,i})).filter(x=>ids.has(x.m.id));
    state.memos=state.memos.filter(m=>!ids.has(m.id));save();exitSelect();renderMemos();updateCounts();
    toast('已刪除 '+rm.length+' 張便條',()=>{rm.forEach(x=>state.memos.splice(x.i,0,x.m));save();renderMemos();updateCounts();});
  }else{
    const rm=state.todos.map((t,i)=>({t,i})).filter(x=>ids.has(x.t.id));
    state.todos=state.todos.filter(t=>!ids.has(t.id));save();exitSelect();renderTodos();updateCounts();
    toast('已刪除 '+rm.length+' 項待辦',()=>{rm.forEach(x=>state.todos.splice(x.i,0,x.t));save();renderTodos();updateCounts();});
  }
};

/* ---- 分頁 / 搜尋 / 計數 ---- */
function updateCounts(){
  document.getElementById('memoCnt').textContent=state.memos.length;
  document.getElementById('todoCnt').textContent=state.todos.filter(t=>!t.done).length;
}
document.querySelectorAll('.tab').forEach(b=>{
  b.onclick=()=>{
    if(selectMode)exitSelect();
    document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));b.classList.add('active');
    state.tab=b.dataset.tab;save();
    document.getElementById('memoView').style.display=state.tab==='memo'?'':'none';
    document.getElementById('todoView').style.display=state.tab==='todo'?'':'none';
  };
});
const sInput=document.getElementById('searchInput');
sInput.addEventListener('input',()=>{
  search=sInput.value.trim().toLowerCase();
  document.getElementById('searchBar').classList.toggle('has',!!search);
  renderMemos();renderTodos();
});
document.getElementById('searchClr').onclick=()=>{sInput.value='';search='';
  document.getElementById('searchBar').classList.remove('has');renderMemos();renderTodos();sInput.focus();};

/* ---- 選單：匯出 / 匯入 / 清空 ---- */
const pop=document.getElementById('menuPop');
document.getElementById('menuBtn').onclick=e=>{e.stopPropagation();pop.classList.toggle('show');};
document.addEventListener('click',()=>pop.classList.remove('show'));
pop.addEventListener('click',e=>e.stopPropagation());
document.getElementById('mExport').onclick=()=>{
  const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  const d=new Date();a.download='techo-backup-'+d.getFullYear()+(''+(d.getMonth()+1)).padStart(2,'0')+(''+d.getDate()).padStart(2,'0')+'.json';
  a.click();URL.revokeObjectURL(a.href);pop.classList.remove('show');
};
document.getElementById('mImport').onclick=()=>{document.getElementById('fileImport').click();pop.classList.remove('show');};
document.getElementById('fileImport').addEventListener('change',ev=>{
  const f=ev.target.files[0];if(!f)return;const r=new FileReader();
  r.onload=()=>{try{
    const d=JSON.parse(r.result);let add=0;
    (d.memos||[]).forEach(m=>{if(!state.memos.some(x=>x.id===m.id)){state.memos.push(m);add++;}});
    (d.todos||[]).forEach(t=>{if(!state.todos.some(x=>x.id===t.id)){state.todos.push(t);add++;}});
    save();renderMemos();renderTodos();updateCounts();toast('已匯入 '+add+' 項');
  }catch(e){toast('檔案格式錯誤');}};
  r.readAsText(f);ev.target.value='';
});
document.getElementById('mClear').onclick=()=>{
  pop.classList.remove('show');
  const backup=JSON.parse(JSON.stringify(state));
  state.memos=[];state.todos=[];save();renderMemos();renderTodos();updateCounts();
  toast('已全部清空',()=>{state=backup;save();renderMemos();renderTodos();updateCounts();});
};

/* ---- 啟動 ---- */
(function(){
  const d=new Date(),wk=['日','一','二','三','四','五','六'][d.getDay()];
  document.getElementById('date').textContent=d.getFullYear()+' / '+(d.getMonth()+1)+' / '+d.getDate()+' · 週'+wk;
  load();
  document.querySelector('.tab[data-tab="'+state.tab+'"]').click();
  renderMemos();renderTodos();updateCounts();
})();
</script>
</body>
